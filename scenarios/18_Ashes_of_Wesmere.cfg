    {STARTING_VILLAGES 1 6}

    [event]
        name=prestart

        # wmllint: recognize Elynia
        {RECALL_ELYNIA}
        # wmllint: recognize Mal Keshar
        {RECALL_MAL_KESHAR}
        # wmllint: recognize Erathan
        {RECALL_ERATHAN}
        # wmllint: recognize Igor
        {RECALL_IGOR}

        [fire_event]
            name=reset objectives
        [/fire_event]

        # Load the scenario terrain mask and split it in two chunks.
        # The top chunk is used during the illusion event, while the bottom
        # chunk is used to reveal the way out of the scenario.

        {@? {MASK 18_Ashes_of_Wesmere.mask} <<
            local raw = (...).mask
            -- NOTE: we calculate the Y edge values by looking for location
            -- markers in the mask data. In reality only the bottom edge value
            -- is needed in WML because it's used to define the extents of a
            -- terrain mask operation.
            local y, top_y_edge, bottom_y_edge = 0, 0, 0
            local mask, top_mask, bottom_mask = "", "", ""
            local skipping = false

            for row in raw:gmatch("[^\x0a]*") do
                if row:match("BOTTOM_MASK_Y_EDGE") then
                    skipping = false
                    bottom_y_edge = y
                end

                if not skipping then
                    mask = string.format("%s%s\x0a", mask, row)
                end

                if row:match("TOP_MASK_Y_EDGE") then
                    top_mask = mask
                    skipping = true
                    top_y_edge = y
                    mask = ""
                end

                y = y + 1
            end

            bottom_mask = mask

            wprintf(W_DBG, "wesmere mask scan complete - %d rows, top %d, bottom %d", y, top_y_edge, bottom_y_edge)

            wml.variables.wesmere_mask = {
                top           = top_mask,
                bottom        = bottom_mask,
                bottom_y_edge = bottom_y_edge
            }
        >>}

        # Setup Verlissh spawns using flag A

        [store_locations]
            terrain=*^&A
        [/store_locations]

        [foreach]
            array=location
            readonly=yes
            [do]
                [unit]
                    type=Verlissh Matrix Flow System
                    x,y=$this_item.x,$this_item.y
                    side=3
                    upkeep=free
                    ai_special=guardian
                [/unit]
            [/do]
        [/foreach]

        # Setup Shaxthal spawns using hive cell terrains

        [_18_setup_hive][/_18_setup_hive]

        [foreach]
            array=wesmere_hive
            readonly=yes
            [do]
                # Skip locations too close to the player
                [if]
                    {VARIABLE_POS_EQUALS this_item 22 10}
                    [or]
                        {VARIABLE_POS_EQUALS this_item 15 13}
                    [/or]
                    [then]
                        [continue][/continue]
                    [/then]
                [/if]

                {VARIABLE_RANDOM wesmere_hive.respawn_time 3..5}

                {TIMED_DRONE_SPAWNER $wesmere_hive.respawn_time (
                    type=Shaxthal Drone
                    variation=surface
                ) 2 $this_item.x $this_item.y}
            [/do]
        [/foreach]

        # Force dispatch prestart to trigger the initial respawn of units via
        # SPAWNER_BASE

        [fire_event]
            name=prestart
        [/fire_event]

        # Replace flag B with hive cells that we don't want included in the
        # spawner setup above because the units will be within the lower map
        # mask region

        [terrain]
            [and]
                terrain=*^&B
            [/and]
            terrain=^Xp
            layer=overlay
        [/terrain]

        # Finish setup

        {TAINT:OFF}

        {CLEAR_VARIABLE wesmere_hive,location}
    [/event]

    [event]
        id=wesmere:top_mask

        [terrain_mask]
            x,y=1,1
            border=yes
            mask=$wesmere_mask.top
        [/terrain_mask]

        [redraw][/redraw]
    [/event]

    [event]
        id=wesmere:bottom_mask

        {PLACE_IMAGE items/gohere.png 50 59}

        [terrain_mask]
            x,y=1,"$(1+$wesmere_mask.bottom_y_edge)"
            border=yes
            mask=$wesmere_mask.bottom
        [/terrain_mask]

        [redraw][/redraw]
    [/event]

    {TAINT:CONTROLLER}

#define AOW_OBJECTIVES CURRENT_OBJECTIVE
    {OBJECTIVES (
        {OBJECTIVE_VICTORY ({CURRENT_OBJECTIVE})}

        {OBJECTIVE_DEFEAT ( _ "Death of Galas")}
        {OBJECTIVE_DEFEAT ( _ "Death of Elynia")}
        {OBJECTIVE_DEFEAT ( _ "Death of Mal Keshar")}
        {OBJECTIVE_DEFEAT ( _ "Death of Erathan")}

        {TURNS_RUN_OUT}

        {OBJECTIVE_CARRYOVER_NO_BONUS}

        {OBJECTIVE_NOTE ( _ "Villages in this scenario provide no gold income but exempt all units from upkeep costs")}
        {TAINT:NOTE}
    )}
#enddef

    [event]
        name=reset objectives
        first_time_only=no

        {AOW_OBJECTIVES ( _ "Explore the remains of Wesmere")}
    [/event]

    [event]
        name=start

        [message]
            speaker=Mal Keshar
            message= _ "Behold, the great forest of Wesmere! Home to the Ka’lian, the Great Council of the Elves — as well as the sacred capital of the Blood Apostle, the Fair Leader of the Wise People, the Ninth Bane of Inferno and Herald of Irdya’s New Awakening, Demon Lord Zhangor!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "... Never utter his titles again, Malin Keshar, unless you would rather see me test your silly theory about transcending life and death."
        [/message]

        [message]
            speaker=Galas
            message= _ "So this is the place. It is quite... desolated now."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Nothing was left of the former glory of Wesmere after that night. Trees, beasts, elves and all other civilized life... all that stood in Zhangor’s path of destruction was burned to ashes, leaving nothing behind for us to bury as elvish custom demands. That would have been the end of all elvish civilization if Argan and I... if we hadn’t..."
        [/message]

        [message]
            speaker=Erathan
            message= _ "Well, we didn’t come here to weep for the fallen of wars past. The enemy knows we are here and will be searching for us shortly, I imagine. Where should we head to?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "I... well, I am not sure if it’s still intact, but back then there used to be a cave system leading to the lands of Wesnoth. If we can find it, we might be able to use it to skirt the Chaos patrols... that is, assuming they are unaware of its existence in the first place."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "That does seem highly unlikely, don’t you think? How long has it been again? Thousands, millions of years? Does anyone know?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "Anyway, if we make it past the end of the caverns, we will be halfway to the empire’s capital, and... the Chaos Emperor. It seems odd they would choose the ruins of the old empire’s capital to establish their own. Anything of value that was left in it after the Fall must have been taken by scavengers and thieves since then."
        [/message]

        [message]
            speaker=Galas
            message= _ "Let us find that cave, then— Wait, why is the ground glimmering under the moonlight?"
        [/message]
    [/event]

    [event]
        name=side 1 turn 1 end

        [message]
            speaker=Elynia
            message= _ "It would seem our ‘friends’ have been busy at work in the ruins. All these structures are artificial in nature and weren’t here at the time. What purpose could they serve?"
        [/message]

        {MYSTERIOUS_VOICE ( _ "Galas...")}
    [/event]

    [event]
        name=turn 2

        {MYSTERIOUS_VOICE ( _ "Galas... I see you...")}

        [message]
            speaker=Mal Keshar
            message= _ "Normally, necromancy is much easier to perform in places that have been affected by powerful magic like this because of how it weakens the divide between the physical realm and the Land of the Dead... But something about this place seems <i>wrong</i>, as though the flow of energy in both realms has been deeply altered."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Are you worried this might prove too much for you to handle, Malin?"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Definitely not! How dare you even suggest that I, Mal Keshar the Insuperable, may not be able to tackle this, the greatest of challenges?! Just make sure not to dispatch my minions too far away from our present location. We certainly wouldn’t want <i>whatever is going on</i> to attempt to wrestle control away from me."
        [/message]

        {TAINT:SHOW_HELP}

        {TAINT:ON}
    [/event]

    [event]
        name=turn 5

        [message]
            speaker=Galas
            message= _ "It should be dawn by now — the moon has set and Naia should have already appeared in the sky, yet the skies continue to be dark. What is going on?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "Zhangor’s curse."
        [/message]

        [message]
            speaker=Galas
            message= _ "What do you mean?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "A testament to the dreadful power he unleashed that night to tear the earth asunder. Not even Argan with his thorough understanding of dark magic could fully comprehend what was happening around us, but with each blow it seemed as though the Demon Lord was unraveling the very substance of our reality. Once a sanctuary of verdure, Wesmere is now but a deep festering wound on Irdya that time cannot heal and sunlight will never touch again."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "This place gives me this disconcerting feeling as though even us keeping our physical shape is not guaranteed. Perhaps we should have taken a different route."
        [/message]

        [message]
            speaker=Galas
            message= _ "It may be too late to turn back now..."
        [/message]
    [/event]

    [event]
        name=turn 7

        # po: Existence is breaking down slightly, and Argan is taking
        # po: advantage of the situation. This event's dialogue should have a
        # po: dream/nightmare-like feeling to it.
        {MYSTERIOUS_VOICE ( _ "Even in this fractured land where the Demon Lord unleashed the power of the gods untold centuries ago, I can see you, as small and insignificant as you are.")}

        [message]
            speaker=Galas
            message= _ "My head... hurts..."
        [/message]

        [message]
            speaker=Elynia
            message= _ "The dense air of this land is probably to blame for that. We really shouldn’t have come this way."
        [/message]

        {MYSTERIOUS_VOICE ( _ "Worry not, elf. If you turn back now, you will find horrors beyond your comprehension at the edge of the world.")}

        [fire_event]
            id=wesmere:top_mask
        [/fire_event]

        [message]
            speaker=Galas
            message= _ "We cannot turn back now. Irdya does not exist anymore back where we came from."
        [/message]

        [scroll_to]
            x,y=20,1
        [/scroll_to]

        [message]
            speaker=Erathan
            scroll=no
            message= _ "What are you talking about, elf? Have you lost your senses??"
        [/message]

        [message]
            speaker=Elynia
            caption= _ "Anlindë"
            image="portraits/anlinde.png"
            message= _ "He’s right. The mountains of the North vanished. We cannot turn back now. We must press onward."
        [/message]

        [message]
            speaker=Galas
            message= _ "Huh???"
        [/message]

        [message]
            speaker=Elynia
            message= _ "... Galas? Are you all right?"
        [/message]

        [message]
            speaker=Erathan
            caption= _ "Zhangor"
            message= _ "<i>Elynia...</i> Of course he isn’t! This place is clearly getting to him. <i>Elynia...</i> Why are we here again?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "..."
        [/message]

        [message]
            speaker=Galas
            caption= _ "Argan"
            message= _ "<i>Elynia...</i> Elynia? Why do you suddenly look terrified?"
        [/message]

        [message]
            speaker=Elynia
            # po: "Argan"
            message= _ "Arg— No, no... it’s... nothing."
        [/message]

        [message]
            speaker=Mal Keshar
            # po: It looks like he's talking nonsense, but it really IS Mal Keshar staring at himself.
            # po: This may sound familar to you if you've played Descent into Darkness.
            message= _ "Pah! I should have stayed back at my underground abode instead of getting involved with your bunch. Now I’m stuck here and I can sense myself staring at me across the Veil. It’s uncomfortable."
        [/message]

        {MYSTERIOUS_VOICE ( _ "A creature of Light like you does not belong in my domain, and yet you insist, Galas.

Why is that? Do you yearn to become a hero and die as such?

But why must you drag your friends along with you? Not even I could hope to protect them from the Demon Lord’s lingering taint should they succumb to its pernicious whispers.")}

        [message]
            speaker=Galas
            message= _ "... Keep moving forward."
        [/message]
    [/event]

#define AOW_SCROLL_TO
    [scroll_to]
        x,y=$x2,$y2
    [/scroll_to]
#enddef

#define AOW_SCROLL_BACK
    [scroll_to]
        x,y=$x1,$y1
    [/scroll_to]
#enddef

    [event]
        name=attack end
        [filter]
            side=1
        [/filter]
        [filter_second]
            race=shaxthal
        [/filter_second]

        {EVENT_FORWARD_DISPATCH_SIMPLE "spotted hive dwellers"}
    [/event]

    [event]
        name=attack end
        [filter]
            race=shaxthal
        [/filter]
        [filter_second]
            side=1
        [/filter_second]

        {EVENT_INVERSE_DISPATCH_SIMPLE "spotted hive dwellers"}
    [/event]

    [event]
        name=spotted hive dwellers

        [message]
            speaker=Erathan
            message= _ "Those infernal flying creatures! What are they?! How can they float if they are as heavy as their land cousins?!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Pah, just what we needed... let us hope we don’t have to fight a whole swarm of these things."
        [/message]

        {AOW_SCROLL_BACK}
    [/event]

    [event]
        name=moveto
        [filter]
            x=1-100
            y=26-100
            side=1
        [/filter]

        [message]
            speaker=Galas
            message= _ "Ugh... Elynia, how much longer? It feels like we have spent days traversing this wasteland."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Not much longer, Galas. It should be around here. <small>Where is it... where is it... it should be around here...</small>"
        [/message]

        [event]
            name=side 1 turn end

            [fire_event]
                name=stage 2a
            [/fire_event]
        [/event]

        [event]
            name=turn end

            [fire_event]
                name=stage 2b
            [/fire_event]
        [/event]
    [/event]

#define AOW_REVEAL_AREA SLF
    [lift_fog]
        side=1
        {SLF}
    [/lift_fog]

    [remove_shroud]
        side=1
        {SLF}
    [/remove_shroud]
#enddef

    [event]
        name=stage 2a

        [message]
            speaker=Mal Keshar
            message= _ "You know, I begin to doubt that cave system still exists, Elynia. Although I cannot send minions much farther away from us, all evidence points to there being nothing but more of these alien structures for countless miles."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Figures that our talkative pile of bones would allow himself to be deceived by appearances. I was <i>raised</i> in this land, I know what I’m doing."
        [/message]

        [fade_out_music]
            duration=1000
        [/fade_out_music]

        {REPLACE_SCENARIO_MUSIC "acherontic.ogg"}

        [message]
            speaker=Mal Keshar
            # po: This is a reference to the Groundhog Day tradition. Although the icemonax was actually
            # po: modeled after armadillos and their extinct prehistoric relatives, glyptodons, the name
            # po: itself may reference the real-life groundhog (also known as monax).
            message= _ "Pfft, after this long a memory of the past is no more reliable than an icemonax’s divination."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Oh yes, Mal Keshar the Damned himself would certainly be in the position to lecture me about the past! I’m sorry about the fact that the taint in this place renders your arts a bit useless — I should have seen that coming! Maybe if you complained a little less you would be able to focus more on keeping your minions under control!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "... What’s gotten into you? You are being a bit more insufferable than usual."
        [/message]

        [message]
            speaker=Elynia
            message= _ "I am perfectly fine, other than the fact that <b>your</b> presence keeps interfering with my magic! Of course, it turns out even the Lady of Light’s radiance can be eclipsed by the malignant darkness that accompanies a lich and his putrid minions everywhere they go. I should’ve asked for you to stay back in the Far North sleazing around with those disgusting apprentices of yours!!"
        [/message]

        [message]
            speaker=Galas
            message= _ "<i>(holds temples)</i> Please, less arguing and more focusing on our mission. We have tarried here for too long as it is."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Hey now, it is not my fault that your light isn’t powerful enough to overcome my magnificent darkness yet! You are the one who decided to slumber her crippling depression away in some damp cave for whoever-knows-how-long instead of, uh, I don’t know, <b>helping</b> your people survive the end of the world and maybe finding a new lover along the way??"
        [/message]

        [message]
            speaker=Elynia
            message= _ "... I advise you be <b>very</b> careful with your choice of words, necromancer, unless you want to meet the Dark Gods right here and now."
        [/message]

        [message]
            speaker=Galas
            message= _ "Ugh..."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [message]
            speaker=Elynia
            message= _ "<i>(indistinct chatter)</i>"
        [/message]
    [/event]

    [event]
        name=stage 2b

        [message]
            speaker=Mal Keshar
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [message]
            speaker=Erathan
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [message]
            speaker=Igor
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [screen_fade]
            alpha=64
            duration=500
        [/screen_fade]

        {MYSTERIOUS_VOICE ( _ "Who knew that she and the necromancer would quarrel like children while their very lives are at stake... It goes to show that your companions cannot be trusted, Galas.

The taint in this land runs deep, and you will not escape it if you cannot work as a team. But I... I know a way you can counter it.")}

        [screen_fade]
            alpha=128
            duration=500
        [/screen_fade]

        {MYSTERIOUS_VOICE ( _ "Use your sword. You know what must be done...

Let her Light return to the earth... and bring her... bring her to me...")}

        [message]
            speaker=Galas
            message= _ "I... I..."
        [/message]

        [screen_fade]
            alpha=192
            duration=500
        [/screen_fade]

        [message]
            speaker=Elynia
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "<i>(indistinct chatter)</i>"
        [/message]

        [screen_fade]
            alpha=255
            duration=500
        [/screen_fade]

        {MYSTERIOUS_VOICE ( _ "If you let me... let Uria take care of this...")}

        [message]
            speaker=Galas
            message= _ "... Ely... Elynia..."
        [/message]

        [fade_out_music]
            duration=500
        [/fade_out_music]

        {AOW_REVEAL_AREA (
            x=20-32
            y=31-36
        )}

        {AOW_REVEAL_AREA (
            x,y,radius=26,34,4
        )}

        [redraw][/redraw]

        {REPLACE_SCENARIO_MUSIC northerners.ogg}
        {APPEND_MUSIC           siege_of_laurelmor.ogg}

        [screen_fade]
            alpha=0
            duration=0
        [/screen_fade]

        {RANDOM_PLACEMENT_AREA x,y,radius=23,33,3}
        {PLACE_UNITS_RANDOMLY (Shaxthal Drone) 2 {DIFF 2 3 4} {SHAXTHAL_SURFACE_VARIATION} }

        {RANDOM_PLACEMENT_AREA x,y,radius=31,32,3}
        {PLACE_UNITS_RANDOMLY (Shaxthal Drone) 2 {DIFF 2 2 3} {SHAXTHAL_SURFACE_VARIATION} }

        {RANDOM_PLACEMENT_AREA x,y,radius=27,38,2}
        {PLACE_UNITS_RANDOMLY (Shaxthal Drone) 2 {DIFF 1 2 3} {SHAXTHAL_SURFACE_VARIATION} }

        {CLEAR_PLACEMENT_AREA}

        [message]
            speaker=Elynia
            message= _ "No! We attracted the attention of more of those monsters!"
        [/message]

        #
        # Spawn Oz.
        #

        [modify_side]
            side=3
            {GOLD 120 140 160}
        [/modify_side]

        [unit]
            canrecruit=yes
            side=3
            placement=leader
            type=Gutwrencher Imp
            id=Oz-Deamal
            name= _ "Oz-Deamal"
            [modifications]
                {TRAIT_QUICK}
                {TRAIT_INTELLIGENT}
            [/modifications]
        [/unit]

        [capture_village]
            side=3
            location_id=3
            radius=10
            terrain=*^V*
        [/capture_village]

        {AOW_REVEAL_AREA (
            location_id=3
            radius=4
        )}

        [redraw][/redraw]

        # wmllint: local spelling grargh

        [message]
            speaker=Oz-Deamal
            message= _ "The rebels are here, huh? Grargh, why do I get to do all the hard work around here while those lazy bastards in Kalari sleep off? Don’t let any single one of them escape!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Great, just what we needed! These filthy demons just caaaaan’t stay away from things that simply aren’t their business, can they?!"
        [/message]

        [message]
            speaker=Galas
            message= _ "<b>EVERYONE!</b> Focus, we cannot let pointless arguments divide us while stranded in enemy territory! We <b>must</b> work together if we want to overcome the evil of this place!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "... Right, I understand. Let us deal with these abominations, then."
        [/message]

        {AOW_OBJECTIVES ( _ "Defeat the enemy leader")}
    [/event]

    [event]
        name=die
        [filter]
            id=Oz-Deamal
        [/filter]

        [fire_event]
            name=reset objectives
        [/fire_event]

        [fade_out_music]
            duration=1000
        [/fade_out_music]

        {REPLACE_SCENARIO_MUSIC nunc_dimittis.ogg}
        {APPEND_MUSIC           weight_of_revenge.ogg}
        {INCIDENTAL_MUSIC       wanderer.ogg}

        [message]
            speaker=Galas
            message= _ "That was a close call. But I doubt your plan will help us much now, Elynia — they clearly know we are here and have made preparations for our arrival."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Well, look at it this way. Once we leave these plains, sooner or later we will have to endure the trials of the desert. I would rather fight demons and these metallic fiends underground than let the suns burn my wings and skin off while they confront us above ground. Surely you and <i>especially</i> Malin will agree with me on this."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Hmph. You make a good point. I don’t like sand — it’s annoying and it gets into all my joints."
        [/message]

        [message]
            speaker=Elynia
            message= _ "I’m sorry for losing my temper. I don’t know what got into me... there is something awfully familar about the energy that fills the place, but at the same time... it feels like I get glimpses of something that has not yet happened. It’s as though I can feel another me staring at us from afar."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Eh. You get used to it after a while."
        [/message]

        [fire_event]
            id=wesmere:bottom_mask
        [/fire_event]

        {AOW_REVEAL_AREA (
            location_id=goal_marker
            radius=4
        )}

        [redraw][/redraw]

        [message]
            speaker=Elynia
            message= _ "Wait, what do you mean? You can feel it too then? What about you, Galas?"
        [/message]

        [message]
            speaker=Galas
            message= _ "... I feel something like that, yes, but there is more. It’s like I can hear someone’s voice... a voice that I—"
        [/message]

        [message]
            id=Erathan
            [or]
                id=Igor
            [/or]
            [or]
                id=Mal Keshar
            [/or]
            message= _ "Everyone, look over there! There is something behind the fog!"
        [/message]

        [scroll_to]
            location_id=goal_marker
        [/scroll_to]

        {HIGHLIGHT_GOAL location_id=goal_marker}

        [message]
            speaker=Elynia
            message= _ "The cave entrance! We should head there now. Galas, you were saying?"
        [/message]

        {MYSTERIOUS_VOICE ( _ "Your band sure likes to take their time. It would be unfortunate if my subjects were to dispatch more biomechanical creatures to your present location.")}

        [message]
            speaker=Galas
            message= _ "... We have no time to spare. I’ll explain later."
        [/message]

        {AOW_OBJECTIVES ( _ "Enter the caves with Galas, Elynia or Mal Keshar")}
    [/event]

    # Every few turns, Verlissh crawlers spawn from the flow system spires if a player
    # unit is sufficiently close to them

    [event]
        name=new turn
        first_time_only=no
        [filter_condition]
            {VARIABLE_IS_MULTIPLE turn_number 3}
        [/filter_condition]

        [_18_spawn_crawlers]
            side=3
            parent_type="Verlissh Matrix Flow System"
            child_type="Psy Crawler"
            count={DIFF 1 2 2}
            max_distance=16
        [/_18_spawn_crawlers]
    [/event]

    {FIRE_EVENT_ON_STUMBLE_UPON "spotted hive stem" (type="Verlissh Matrix Flow System")}

    [event]
        name=spotted hive stem

        {AOW_SCROLL_TO}

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=Galas
            message= _ "There may not be any living trees left on these plains, but those alien structures sure play the part."
        [/message]

        {AOW_SCROLL_BACK}
    [/event]

    {FIRE_EVENT_ON_STUMBLE_UPON "spotted zombie tree" (
        side=4
        type=Walking Corpse,Soulless
        variation=wose
    )}

    [event]
        name=spotted zombie tree

        {AOW_SCROLL_TO}

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=Erathan
            message= _ "There’s something very wrong going on here... Why are there dead tree-folk wandering around?"
        [/message]

        {AOW_SCROLL_BACK}
    [/event]

    {FIRE_EVENT_ON_STUMBLE_UPON "spotted zombie drake" (
        side=4
        type=Walking Corpse,Soulless
        variation=drake
    )}

    [event]
        name=spotted zombie drake

        {AOW_SCROLL_TO}

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=Galas
            message= _ "Is that... Could it be? A dragon’s corpse?"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Not quite. There once was a race of dragon-like creatures, the Drakes. Most of them were quite large and could fly and breath fire, so they would easily pass for dragons to a casual observer. Ah, it’s a pity that none of them survived the events of the Fall... as far as I know, at least."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Hm. I would not be surprised if they still existed somewhere on Irdya. It is a quite large world, after all, and they proved to be quite adaptable in the past."
        [/message]

        {AOW_SCROLL_BACK}
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            [filter_location]
                [filter_adjacent_location]
                    terrain=Qxv # wmllint: ignore
                [/filter_adjacent_location]
            [/filter_location]
        [/filter]

        [if]
            [have_unit]
                x,y=$x1,$y1
                race=bats,undead
                [not]
                    type=Lich
                [/not]
            [/have_unit]
            [then]
                [fire_event]
                    name=discuss cracks
                    [primary_unit]
                        id=Mal Keshar
                    [/primary_unit]
                [/fire_event]
            [/then]
            [else]
                [fire_event]
                    name=discuss cracks
                    [primary_unit]
                        x,y=$x1,$y1
                    [/primary_unit]
                [/fire_event]
            [/else]
        [/if]
    [/event]

    [event]
        name=discuss cracks

        [message]
            speaker=unit
            female_message= _ "female^A current of hot air ascends from the bottom of this chasm. It is as though the very earth is boiling inside. I reckon this is why the plains are relatively warm in spite of the unending darkness that envelops the land?"
            male_message= _ "A current of hot air ascends from the bottom of this chasm. It is as though the very earth is boiling inside. I reckon this is why the plains are relatively warm in spite of the unending darkness that envelops the land?"
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            id=Galas,Mal Keshar,Elynia
            [filter_location]
                location_id=goal_pos
                radius=3
            [/filter_location]
        [/filter]

        {ENDLEVEL_VICTORY no}
    [/event]

    [event]
        name=time over

        [message]
            speaker=Erathan
            message= _ "A huge swarm of drones... what do we do?"
        [/message]

        [message]
            speaker=Galas
            message= _ "We’re not equipped to handle a threat of this scale! We should have found the cave entrance faster..."
        [/message]
    [/event]

    [event]
        name=victory

        [message]
            speaker=Erathan
            message= _ "What... is that up in the sky? It looks like a swarm of locusts?!"
        [/message]

        [message]
            speaker=Galas
            message= _ "I have a very bad feeling about this. We ought to hurry inside and seal up the entrance, now!"
        [/message]

        {CLEAR_VARIABLE wesmere_mask}
    [/event]
[/scenario]

