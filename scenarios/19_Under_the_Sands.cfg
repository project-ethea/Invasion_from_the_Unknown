    [event]
        name=prestart

        {TAINT:ON}

        {VARIABLE enemy_casualties   0}
        {VARIABLE destroyed_matrices 0}

        [count_units]
            type=Verlissh Matrix Core
            variable=total_matrices
        [/count_units]

        [time_area]
            id=outside
            location_id=ending_keep
            radius={INFINITY}
            [filter_radius]
                terrain=!,X*,X*^*,U*,U*^*
            [/filter_radius]

            {TWO_SUNS_DEFAULT_SCHEDULE}
        [/time_area]

        [teleport]
            [filter]
                id=Galas
            [/filter]
            location_id=galas_start
        [/teleport]

        # Only recall Elynia and Galas -- the other two come in after the start cutscene

        # wmllint: recognize Elynia
        {RECALL_ELYNIA_AT      8  2}
        # wmllint: recognize Mal Keshar
        {RECALL_MAL_KESHAR_AT  9  5}

        {FACE_DIRECTION (id=Elynia)     sw}
        {FACE_DIRECTION (id=Mal Keshar) se}
        {FACE_DIRECTION (id=Galas)      se}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Proceed south to the cave exit with Elynia and Mal Keshar")}

            {OBJECTIVE_DEFEAT ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT ( _ "Death of Mal Keshar")}
            {OBJECTIVE_DEFEAT ( _ "Death of Erathan")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}

            {TAINT:NOTE}
        )}

        {LOCK_VIEW}
    [/event]

    {TAINT:CONTROLLER}

#define UTS_HURT_GALAS FACTOR
    [harm_unit]
        [filter]
            id=Galas
        [/filter]
        kill=no
        amount="$($this_unit.hitpoints * {FACTOR})"
        animate=yes
        # We need to set an attack so his range-specific defense animations are properly
        # matched when using the Elvish Fighter line's animations
        [secondary_attack]
            range=melee
            name=sword
        [/secondary_attack]
    [/harm_unit]
#enddef

    [event]
        name=start

        [message]
            speaker=Galas
            message= _ "The place reeks of decomposing flesh and sewage — I can hardly breathe! This impenetrable darkness does not help matters either."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Hey, the stench of putrefaction never hurt anybody before — not me, at least. We should remain alert, though — we haven’t escaped the taint of this land yet."
        [/message]

        {FLASH_BLACK ()}

        {MYSTERIOUS_VOICE ( _ "Galas...")}

        [message]
            speaker=Elynia
            message= _ "The more I see the horrors created by the creatures of Inferno and the Chaos humans, the more I fear for Irdya’s fate. What will become of the prosperous northlands if we cannot put a stop to their invasion at its source? Why do they do this? Is there a purpose to this senseless decay and destruction? What will their next step be should they succeed in turning the entire continent into a barren wasteland?"
        [/message]

        {FLASH_BLACK ()}

        {REPLACE_SCENARIO_MUSIC silence.ogg}

        {UTS_AMBIENCE:OFF}

        {MYSTERIOUS_VOICE ( _ "Do you feel that, Galas?")}

        {FLASH_BLACK ()}

        [message]
            speaker=Galas
            message= _ "I... I’m feeling ill..."
        [/message]

        [screen_fade]
            alpha=64
            duration=500
        [/screen_fade]

        {MYSTERIOUS_VOICE ( _ "The mind and the soul are integral to the existence of life. These precious little things are the gift of the gods who created us and our universe.")}

        [move_unit]
            id=Elynia
            to_location=elynia_a
        [/move_unit]

        [message]
            speaker=Elynia
            message= _ "Galas, just hold on a little longer... these tunnels will take us out of the Wesmere plains and then we should be free from the taint!"
        [/message]

        {FLASH_BLACK ()}

        [screen_fade]
            alpha=64
            duration=0
        [/screen_fade]

        {MYSTERIOUS_VOICE ( _ "But at times like these, free will truly becomes a curse that allows lesser beings like you to be led astray.

Uria is a forgiving god, but there is little that can be done to remedy things when fools like you <b>actively</b> refuse to listen to her <b>Voice</b>.")}

        [message]
            speaker=Galas
            message= _ "It’s— it’s not just that, Elynia... It’s him... He... he... he is—"
        [/message]

        {MYSTERIOUS_VOICE ( _ "Have you ever wondered what it would feel like if a greater being could reach into your mind and simply... crush it... as if it were naught but a clump of dirt?")}

        {REPLACE_SCENARIO_MUSIC acherontic.ogg}

        {UTS_HURT_GALAS 0.33}

        [message]
            speaker=Galas
            message= _ "<b>AAAAAAHHHHHHHHHH!!!</b> It hurts— Get out of my head... Please... Elynia!!! <b>HELP ME!!!</b>" # wmllint: no spellcheck
        [/message]

        [screen_fade]
            alpha=128
            duration=500
        [/screen_fade]

        [move_unit]
            id=Elynia
            to_location=elynia_b
        [/move_unit]

        [message]
            speaker=Elynia
            message= _ "G— Galas!? I... What should I do? I can’t figure out how to banish the taint—"
        [/message]

        {MYSTERIOUS_VOICE ( _ "On the surface or under the ground, it makes no difference to me, Galas. The lands of Chaos are <b>my</b> domain, bestowed upon me by the Guardian of Life herself. Either pledge allegiance to her, or you shall be purged as the <b>intruder</b> you are!")}

        {UTS_HURT_GALAS 0.66}

        [message]
            speaker=Galas
            message= _ "N— n— <b>NEVER!!!</b> Ack—"
        [/message]

        [screen_fade]
            alpha=192
            duration=500
        [/screen_fade]

        [message]
            speaker=Mal Keshar
            message= _ "Elynia, it’s not the taint. Do you not feel it? The darkness that envelops him right now is not the Demon Lord’s."
        [/message]

        [message]
            speaker=Elynia
            message= _ "...!"
        [/message]

        [screen_fade]
            alpha=255
            duration=500
        [/screen_fade]

        [message]
            speaker=Mal Keshar
            message= _ "You know what must be done."
        [/message]

        [message]
            speaker=Galas
            message= _ "No... <b>No!</b> I will <b>not</b> do it!!! Please!"
        [/message]

        {REPLACE_SCENARIO_MUSIC silence.ogg}

        [store_unit]
            [filter]
                id=Galas
            [/filter]
            kill=no
            variable=galas_store
        [/store_unit]

        [kill]
            id=Galas
            fire_event=no
            animate=yes
        [/kill]

        [screen_fade]
            alpha=0
            duration=0
        [/screen_fade]

        {THUNDER ()}

        [item]
            x,y=$galas_store.x,$galas_store.y
            image="scenery/galas-unconscious.png~RC(magenta>brown)"
        [/item]

        [delay]
            time=1500
        [/delay]

        [mute_sound_effects][/mute_sound_effects]

        {UTS_AMBIENCE:ON}

        [fade_in_sound_effects]
            duration=500
        [/fade_in_sound_effects]

        {REPLACE_SCENARIO_MUSIC "snowfall.ogg"}
        {APPEND_MUSIC           "nunc_dimittis.ogg"}
        {APPEND_MUSIC           "into_the_shadows.ogg"}
        {APPEND_MUSIC           "weight_of_revenge.ogg"}

        [message]
            speaker=Elynia
            message= _ "Galas, please don’t die, we need you! Why, why couldn’t I see this right in front of me... For how long had this been going on?!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Don’t despair, we have not lost him yet. He’s still alive, just unconscious. Just... make sure to keep him by your side until we find a way back to the surface. Your light is the only thing that can protect him from this darkness, so do not let your guard down again."
        [/message]

        [message]
            speaker=Elynia
            message= _ "I understand. Let’s not tarry here any longer."
        [/message]

        [remove_item]
            x,y=$galas_store.x,$galas_store.y
        [/remove_item]

        [move_unit]
            id=Elynia
            to_location=1
        [/move_unit]

        [modify_unit]
            [filter]
                id=Elynia
            [/filter]
            facing=se
            canrecruit=yes
        [/modify_unit]

        {HIDE_HERO_MARKERS id=Elynia}

        # wmllint: recognize Erathan
        {RECALL_ERATHAN}
        # wmllint: recognize Igor
        {RECALL_IGOR}

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=turn 3

        [message]
            speaker=Elynia
            message= _ "Ugh, carrying Galas around is exhausting. Perhaps you could lend me a hand, Mal Keshar?"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "That had better not be a poor attempt at cracking a joke at my expense."
        [/message]

        [message]
            speaker=Elynia
            message= _ "I... What? Oh! ... Of course not, you fool! I am asking you to help me!"
        [/message]
    [/event]

    [event]
        name=turn 5

        [message]
            speaker=Erathan
            message= _ "I sorely regret accepting the council’s mission to follow you people. This is a truly dreadful place to be for someone who is neither a necromancer nor a walking light source."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "<small>Oh, what a pity. We would be so, so hopeless without your awe-inspiring bunny hunting skills!</small>"
        [/message]

        [message]
            speaker=Erathan
            message= _ "I couldn’t quite catch that, what did you say, lich?"
        [/message]

        [message]
            speaker=Mal Keshar
            # po: He's probably threatening to rip his head off or something.
            message= _ "I said I’m going to—"
        [/message]

        [message]
            speaker=Elynia
            message= _ "Shhh, keep it quiet you two, I’m trying to focus!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "No, you’re not—"
        [/message]

        [message]
            speaker=Elynia
            message={ASIDE ( _ "Stop making my life harder, will you? As much as I would also like to get rid of him, Galas officially accepted the Council’s request to bring him along and we ought to respect that. And no, we are <b>not</b> allowed to cheat our way out of this by killing and bringing him back as a mindless undead minion.")}
        [/message]

        [message]
            speaker=Mal Keshar
            message={ASIDE ( _ "Ugh. Fine.")}
        [/message]
    [/event]

    [event]
        name=turn 9

        # wmllint: local spelling Soooo

        [message]
            speaker=Mal Keshar
            message= _ "Soooo, Elynia... How did you not see the shadows closing in on Galas?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "You have to understand I spent... who knows how many thousands of years asleep underground, Mal Keshar. I have not fully regained control of my powers, and perhaps I never will. I don’t understand the magic that the enemy used against Galas, and it’s probable that only someone well attuned to the essence of darkness like yourself can sense its power."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "It worries me that Yechnagoth was said to possess the ability to infect people’s minds with her darkness. Do you believe she could have survived the fight with those elves and be behind this? Mal Hekuba did say her power still lives thanks to Uria."
        [/message]

        [message]
            speaker=Elynia
            message= _ "It is a possibility we should consider, indeed. But I’m not looking forward to confronting another false god."
        [/message]
    [/event]

    [event]
        name=turn 12

        [message]
            speaker=Mal Keshar
            message= _ "This is taking us far too long. Make haste, you fools!"
        [/message]
    [/event]

    [event]
        name=time over

        [place_shroud]
            side=1
        [/place_shroud]

        [redraw]
            side=1
        [/redraw]

        [message]
            speaker=Mal Keshar
            message= _ "Argh! We have spent far too long in these caves and the darkness has surrounded us! Elynia, do something!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "I am sorry, Galas... This is all my fault..."
        [/message]
    [/event]

    {FIRE_EVENT_ON_STUMBLE_UPON "spotted core"
    type="Verlissh Matrix Core"}

    [event]
        name=spotted core

        [message]
            speaker=Mal Keshar
            message= _ "What in name of the Dark Gods is that thing? It seems to be filled with larvae of those hideous creatures. Shall we destroy it?"
        [/message]

        [message]
            speaker=Erathan
            message= _ "It shouldn’t hurt to get rid of a few of them before they have a chance to hatch."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            canrecruit=yes
            side=3
        [/filter]

        [terrain]
            x=18,17
            y=54,55
            terrain=Urb
        [/terrain]

        [terrain]
            x=21-23,22
            y=   59,58
            terrain=Wwf
        [/terrain]

        [redraw][/redraw]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            sound=touchplate.ogg
            message=_"Touchplate triggered. A wall moves."
        [/message]
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            type=Verlissh Matrix Core
        [/filter]

        {VARIABLE_INC destroyed_matrices}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            [not]
                side=1
            [/not]
        [/filter]

        {VARIABLE_INC enemy_casualties}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            [not]
                side=1
            [/not]
        [/filter]
        [filter_condition]
            {VARIABLE_NUMERICAL_EQUALS enemy_casualties 10}
        [/filter_condition]

        [message]
            speaker=Erathan
            message= _ "Please do not forget that we came to these lands to accomplish a specific goal. Disposing of every single foe we encounter is an impossible task and can only serve to delay us."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Right, right, but it will prove impossible to get through these caverns otherwise, what with them constantly crawling out of the walls. Besides, I could use the entertainment."
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            id=Elynia,Mal Keshar
            x=20-42,24-42
            y=38-61,35-45
        [/filter]

        [allow_undo][/allow_undo]

        [redraw][/redraw]

        [message]
            speaker=Erathan
            message= _ "Where are you going? We didn’t come here to fight these creeps! We ought to focus on getting back to the surface."
        [/message]
    [/event]

    # Victory trigger
    [event]
        name=moveto
        first_time_only=no
        [filter]
            id=Elynia,Mal Keshar
            [filter_location]
                area=outside
            [/filter_location]
        [/filter]

        # Don't allow the player to escape the hive if one of the heroes are in it.
        [if]
            [have_unit]
                id=Elynia,Mal Keshar
                x=20-42,24-42,20-42,24-42
                y=38-61,35-45,38-61,35-45
            [/have_unit]
            [then]
                [if]
                    {VARIABLE_LEXICAL_EQUALS unit.id "Mal Keshar"}
                    [then]
                        [message]
                            speaker=Mal Keshar
                            message= _ "Wait! We can’t leave Elynia behind in the alien hive!"
                        [/message]
                    [/then]
                    [else]
                        [message]
                            speaker=Elynia
                            message= _ "Wait! We can’t leave Mal Keshar behind in the alien hive!"
                        [/message]
                    [/else]
                [/if]
            [/then]
            [else]
                [message]
                    speaker=unit
                    message= _ "Are we ready to exit these caverns?"
                    [option]
                        label={I18N:YES} # wmllint: ignore
                        [command]
                            {ENDLEVEL_VICTORY no}
                        [/command]
                    [/option]
                    [option]
                        label={I18N:NO} # wmllint: ignore
                    [/option]
                [/message]
            [/else]
        [/if]
    [/event]

#define UTS_STORE_AND_SET_LOCATION _ID _STORE_ID _X _Y _FACING
    [store_unit]
        [filter]
            id={_ID}
        [/filter]
        variable={_STORE_ID}
        kill=yes
    [/store_unit]

    {VARIABLE {_STORE_ID}.x      {_X}      }
    {VARIABLE {_STORE_ID}.y      {_Y}      }
    {VARIABLE {_STORE_ID}.facing {_FACING} }
#enddef

    [event]
        name=victory

        {LOCK_VIEW}

        #
        # Clean the map.
        #

        [kill]
            [not]
                side=1
            [/not]
        [/kill]

        {RESTORE_HERO_MARKERS id=Elynia}

        {RESET_AND_SEND_TO_RECALL_LIST (
            side=1
            [not]
                id=Elynia,Mal Keshar,Erathan,Igor
            [/not]
            [not]
                x,y=recall,recall
            [/not]
        )}

        {UTS_STORE_AND_SET_LOCATION (Elynia)     elynia_store  11 73 s }
        {UTS_STORE_AND_SET_LOCATION (Mal Keshar) malin_store   10 73 se}
        {UTS_STORE_AND_SET_LOCATION (Erathan)    erathan_store 14 71 se}

        [if]
            [have_unit]
                id=Igor
            [/have_unit]
            [then]
                {UTS_STORE_AND_SET_LOCATION Igor igor_store 12 75 nw}
            [/then]
        [/if]

        {VARIABLE elynia_store.canrecruit no}

        {FADE_TO_BLACK}

        [place_shroud]
            side=1
        [/place_shroud]

        [redraw]
            side=1
        [/redraw]

        [fade_out_sound_effects][/fade_out_sound_effects]

        [fade_out_music][/fade_out_music]

        {UTS_AMBIENCE:OFF}

        [reset_sound_effects][/reset_sound_effects]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Time passes."
        [/message]

        {VARIABLE galas_store.x 11}
        {VARIABLE galas_store.y 74}

        [scroll_to]
            x,y=$galas_store.x,$galas_store.y
            {WARP}
        [/scroll_to]

        [remove_shroud]
            side=1
            area=outside
        [/remove_shroud]

        [redraw]
            side=1
        [/redraw]

        {FADE_IN}

        [item]
            x,y=$galas_store.x,$galas_store.y
            image="scenery/galas-unconscious.png~RC(magenta>brown)"
        [/item]

        [unstore_unit]
            variable=elynia_store
        [/unstore_unit]

        [unstore_unit]
            variable=malin_store
        [/unstore_unit]

        [unstore_unit]
            variable=erathan_store
        [/unstore_unit]

        [if]
            {VARIABLE_NUMERICAL_EQUALS igor_store.length 1}
            [then]
                [unstore_unit]
                    variable=igor_store
                [/unstore_unit]
            [/then]
        [/if]

        {CLEAR_VARIABLE elynia_store,malin_store,erathan_store,igor_store}

        [redraw][/redraw]

        {REPLACE_SCENARIO_MUSIC "nunc_dimittis.ogg"}

        [delay]
            time=2000
        [/delay]

        [message]
            speaker=Elynia
            message= _ "Galas, please wake up..."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Nothing yet?"
        [/message]

        [message]
            speaker=Elynia
            # po: She doesn't want to say exactly which type of darkness she senses.
            message= _ "I sense... darkness, intertwined with something I can only describe as an infection of some sort. I have seen some of the Chaos cultists use a lesser version of it... It is as though Galas is being held hostage within his own body by an unfathomable force. My light interfered in some way, but I worry this may have caused deeper damage..."
        [/message]

        {MOVE_UNIT id=Erathan 12 72}

        [message]
            speaker=Erathan
            message= _ "(<i>irritated</i>) He still hasn’t regained consciousness? Huh. I have to say, I always thought you elves were more resilient than this. For how much longer do you believe we are going to have to wait here in the open, faerie?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "For as long as need be, of course. But if you really want us to go—"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "You know, human guy, you are a very obnoxious character. If you aren’t going to help us then perhaps you should have stayed back in your cozy home in the Far North. At the very least keep your mouth shut!"
        [/message]

        [message]
            speaker=Erathan
            message= _ "Huh, <i>you</i> of all people are calling me obnoxious, lich? I knew you were not the sharpest tool in the shed, but I may have overestimated your self-awareness."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Never mind what I just said, I will shut your mouth myself—"
        [/message]

        [if]
            [have_unit]
                id=Igor
            [/have_unit]
            [then]
                [message]
                    speaker=Igor
                    message= _ "Please stop! You don’t need to fight each other! We’re all in this together, aren’t we?"
                [/message]

                [message]
                    speaker=Elynia
                    message= _ "Yes, please. If you really must kill each other, then do so in silence. I am trying to focus on bringing Galas back."
                [/message]
            [/then]
            [else]
                [message]
                    speaker=Elynia
                    message= _ "Could you two just <b>behave</b> for a moment?! I am trying to focus here on bringing Galas back. If you really must kill each other, then do so in silence!"
                [/message]
            [/else]
        [/if]

        {REPLACE_SCENARIO_MUSIC "silence.ogg"}

        [hide_unit][/hide_unit]

        {BLACK_SCREEN}

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "A whisper..."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "And a light..."
        [/message]

        [delay]
            time=1500
        [/delay]

        {FADE_IN}

        [unhide_unit][/unhide_unit]

        [delay]
            time=750
        [/delay]

        [remove_item]
            x,y=$galas_store.x,$galas_store.y
        [/remove_item]

        [unstore_unit]
            variable=galas_store
            find_vacant=yes
        [/unstore_unit]

        {CLEAR_VARIABLE galas_store}

        {REPLACE_SCENARIO_MUSIC "heroes_rite.ogg"}

        [delay]
            time=1500
        [/delay]

        {ACHIEVEMENT:GET chaos_emperor_0}

        [message]
            speaker=Galas
            message= _ "What... happened to me?"
        [/message]

        [message]
            speaker=Igor
            message= _ "Oh, master Galas! I’m really happy to see you awake again!"
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Galas
            message= _ "Elynia, what happened? Where are we? Why... Weren’t we in the caves?"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "“What happened?” Why the hell are you asking <b>us</b>?! What happened to you, is the question!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "Galas, I thought for a moment you would never open your eyes again! What did the darkness do to you?"
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Galas
            message= _ "Oh, Elynia... you would not believe me if I told you. You would think I am insane, or suspect that I have been possessed by the enemy."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Really kid, there is nothing to hide. We saw the shadows trying to take hold of your body. I mean, I saw them. Elynia did not."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Galas, please tell us. We are your friends — we have followed you this far, and we will help you no matter what."
        [/message]

        [delay]
            time=1500
        [/delay]

        [message]
            speaker=Galas
            message= _ "I should not have turned a deaf ear to the warnings... Coming to these lands on this assassination mission was ill-advised. Elynia, I saw him... I saw the dark Emperor... that metal-covered face and... He tried to tear into my mind, boasting about his power... He tried to convince me to kill you. He... he almost took control of my body."
        [/message]

        [message]
            speaker=Galas
            message= _ "I tried to resist his power, but..."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Galas
            message= _ "I am not strong enough to do this, Elynia. I— I am not strong enough to avenge Anlindë... I am not..."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "Galas, don’t feel guilty. What you experienced... Very few people have ever managed to fend off that kind of magic. You should be proud of what you did. Even if it could have killed you, you stayed loyal to your friends long enough for me to realize what was going on and protect you with my light."
        [/message]

        [message]
            speaker=Galas
            message= _ "I am truly sorry for causing you so much trouble Elynia. I really am."
        [/message]

        [message]
            speaker=Elynia
            # po: She backtracks. She originally tries to say "if I hadn't assumed he
            # po: would avoid doing anything to you in my presence" because she knows
            # po: it's Argan.
            message= _ "No, Galas, <i>I</i> am sorry for not taking heed of the signs much sooner. I could’ve prevented this if I hadn’t... if I had realized it was the Emperor’s power seeping into you all along. I shall stay by your side from now on — as long as my light reaches you, he cannot do anything to you. I am not the best at fending off physical threats, but I promise to keep you safe from the Emperor’s evil."
        [/message]

        [message]
            speaker=Galas
            message= _ "I couldn’t hope for a better bodyguard, Elynia. Whether under the suns’ searing light or amidst the cold darkness, your radiance is a divine blessing to me all the same. I am grateful to have you by my side."
        [/message]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Elynia visibly blushes for an instant, as though those words reached something deep within her."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "So... we have a mission to complete, don’t we? Some day, your kinsmen will tell stories of how the Grand Lord Galas of the Elves helped save Irdya from certain destruction by the creatures of Uria. These trails we must undergo first will surely be worth it in the end."
        [/message]

        {CLEAR_VARIABLE enemy_casualties}
        # Keep destroyed_matrices for next scenario.

        {UNLOCK_VIEW}
    [/event]
[/scenario]

#undef UTS_FORCE_ZOC
#undef UTS_STORE_AND_SET_LOCATION
#undef UTS_HURT_GALAS
#undef UTS_AMBIENCE:OFF
#undef UTS_AMBIENCE:ON
